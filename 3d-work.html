<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Work</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --surface: #fff;
      --text: #111;
      --muted: #666;
      --line: #e6e6e3;
      --max-width: 1120px;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container { width: min(100% - 2rem, var(--max-width)); margin: 0 auto; }
    .header { border-bottom: 1px solid var(--line); background: rgba(247, 247, 245, 0.95); position: sticky; top: 0; }
    .header-inner { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; gap: 1rem; }
    a { color: inherit; text-decoration: none; }
    nav { display: flex; gap: 1rem; flex-wrap: wrap; }
    nav a[aria-current="page"] { border-bottom: 1px solid var(--text); }
    main { padding: 3rem 0; }
    h1 { margin: 0 0 0.4rem; font-size: clamp(2rem, 5vw, 3rem); }
    .intro { color: var(--muted); margin: 0 0 2rem; max-width: 65ch; }
    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1rem; }
    .item {
      grid-column: span 4;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      margin: 0;
    }
    .item img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
    }
    footer { border-top: 1px solid var(--line); color: var(--muted); font-size: 0.85rem; padding: 1rem 0 2rem; margin-top: 2rem; }
    @media (max-width: 900px) { .item { grid-column: span 6; } }
    @media (max-width: 620px) { .item { grid-column: span 12; } }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html">unph0togenic</a>
      <nav aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="3d-work.html" aria-current="page">3D Work</a>
        <a href="2d-work.html">2D Work</a>
        <a href="photography.html">Photography</a>
        <a href="sculpture.html">Sculpture</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>3D Work</h1>
    <p class="intro">A collection of 3D character studies, scene explorations, and rendered animation frames.</p>
    <section class="grid" aria-label="3D project gallery">
      <figure class="item">
        <img src="3dModel/BunnyHideandSeek02.png" alt="3D render Bunny Hide and Seek 02">
      </figure>
      <figure class="item">
        <img src="3dModel/BunnyinWater.png" alt="3D render Bunny in Water">
      </figure>
      <figure class="item">
        <img src="3dModel/BunnyinWater02.png" alt="3D render Bunny in Water 02">
      </figure>
      <figure class="item">
        <img src="3dModel/Bunnywalk.png" alt="3D render Bunny Walk">
      </figure>
      <figure class="item">
        <img src="3dModel/BunnywalkFinal.png" alt="3D render Bunny Walk Final">
      </figure>
      <figure class="item">
        <img src="3dModel/HideandSeek.png" alt="3D render Hide and Seek">
      </figure>
      <figure class="item">
        <img src="3dModel/SceneB01.png" alt="3D render Scene B01">
      </figure>
      <figure class="item">
        <img src="3dModel/SceneB02.png" alt="3D render Scene B02">
      </figure>
      <figure class="item">
        <img src="3dModel/SceneB03.png" alt="3D render Scene B03">
      </figure>
      <figure class="item">
        <img src="3dModel/SceneB04.png" alt="3D render Scene B04">
      </figure>
    </section>
  </main>

  <footer class="container">© 2026 unph0togenic</footer>
</body>
</html>
