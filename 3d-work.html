<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Work</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --surface: #fff;
      --text: #111;
      --muted: #666;
      --line: #e6e6e3;
      --max-width: 1120px;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container { width: min(100% - 2rem, var(--max-width)); margin: 0 auto; }
    .header { border-bottom: 1px solid var(--line); background: rgba(247, 247, 245, 0.95); position: sticky; top: 0; }
    .header-inner { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; gap: 1rem; }
    a { color: inherit; text-decoration: none; }
    nav { display: flex; gap: 1rem; flex-wrap: wrap; }
    main { padding: 3rem 0; }
    h1 { margin: 0 0 0.4rem; font-size: clamp(2rem, 5vw, 3rem); }
    .intro { color: var(--muted); margin: 0 0 2rem; max-width: 65ch; }
    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1rem; }
    .item {
      grid-column: span 4;
      min-height: 240px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      display: grid;
      place-items: center;
      color: #8a8a8a;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 0.85rem;
    }
    footer { border-top: 1px solid var(--line); color: var(--muted); font-size: 0.85rem; padding: 1rem 0 2rem; margin-top: 2rem; }
    @media (max-width: 900px) { .item { grid-column: span 6; } }
    @media (max-width: 620px) { .item { grid-column: span 12; } }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html">Your Name</a>
      <nav aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="3d-work.html">3D Work</a>
        <a href="2d-work.html">2D Work</a>
        <a href="photography.html">Photography</a>
        <a href="sculpture.html">Sculpture</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>3D Work</h1>
    <p class="intro">Add your 3D projects here. Replace these placeholders with renders, project names, and short descriptions.</p>
    <section class="grid" aria-label="3D project gallery">
      <article class="item">3D Project 01</article>
      <article class="item">3D Project 02</article>
      <article class="item">3D Project 03</article>
      <article class="item">3D Project 04</article>
      <article class="item">3D Project 05</article>
      <article class="item">3D Project 06</article>
    </section>
  </main>

  <footer class="container">© 2026 Your Name</footer>
</body>
</html>
