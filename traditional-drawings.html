<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traditional Drawings</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --surface: #fff;
      --text: #111;
      --muted: #666;
      --line: #e6e6e3;
      --max-width: 1120px;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); }
    .container { width: min(100% - 2rem, var(--max-width)); margin: 0 auto; }
    .header { border-bottom: 1px solid var(--line); background: rgba(247, 247, 245, 0.95); position: sticky; top: 0; z-index: 5; }
    .header-inner { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; gap: 1rem; }
    a { color: inherit; text-decoration: none; }
    nav { display: flex; gap: 1rem; flex-wrap: wrap; }
    nav a[aria-current="page"] { border-bottom: 1px solid var(--text); }
    main { padding: 3rem 0; }
    h1 { margin: 0 0 0.4rem; font-size: clamp(2rem, 5vw, 3rem); }
    .intro { color: var(--muted); margin: 0 0 2rem; max-width: 65ch; }
    .gallery-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      margin: 0;
    }
    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
    }
    footer { border-top: 1px solid var(--line); color: var(--muted); font-size: 0.85rem; padding: 1rem 0 2rem; margin-top: 2rem; }
    @media (max-width: 620px) {
      .container { width: min(100% - 1.4rem, var(--max-width)); }
      .header-inner { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html">unph0togenic</a>
      <nav aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="3d-work.html">3D Work</a>
        <a href="2d-work.html">2D Work</a>
        <a href="traditional-drawings.html" aria-current="page">Traditional Drawings</a>
        <a href="photography.html">Photography</a>
        <a href="sculpture.html">Sculpture</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>Traditional Drawings</h1>
    <p class="intro">A selection of traditional drawing work.</p>
    <figure class="gallery-item">
      <img src="traditional_drawing/IMG_9998.jpg" alt="Traditional drawing piece">
    </figure>
  </main>

  <footer class="container">© 2026 unph0togenic</footer>
</body>
</html>
