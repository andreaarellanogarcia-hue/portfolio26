<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --surface: #fff;
      --text: #111;
      --muted: #666;
      --line: #e6e6e3;
      --max-width: 1120px;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); }
    .container { width: min(100% - 2rem, var(--max-width)); margin: 0 auto; }
    .header { border-bottom: 1px solid var(--line); background: rgba(247, 247, 245, 0.95); position: sticky; top: 0; z-index: 5; }
    .header-inner { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; gap: 1rem; }
    a { color: inherit; text-decoration: none; }
    nav { display: flex; gap: 1rem; flex-wrap: wrap; }
    nav a[aria-current="page"] { border-bottom: 1px solid var(--text); }
    main { padding: 3rem 0; }
    h1 { margin: 0 0 0.4rem; font-size: clamp(2rem, 5vw, 3rem); }
    .intro { color: var(--muted); margin: 0 0 2rem; max-width: 65ch; }
    .gallery {
      columns: 3 250px;
      column-gap: 1rem;
    }
    figure {
      margin: 0 0 1rem;
      break-inside: avoid;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
    }
    img {
      display: block;
      width: 100%;
      height: auto;
    }
    footer { border-top: 1px solid var(--line); color: var(--muted); font-size: 0.85rem; padding: 1rem 0 2rem; margin-top: 2rem; }
    @media (max-width: 620px) {
      .container { width: min(100% - 1.4rem, var(--max-width)); }
      .header-inner { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html">unph0togenic</a>
      <nav aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="3d-work.html">3D Work</a>
        <a href="2d-work.html">2D Work</a>
        <a href="photography.html" aria-current="page">Photography</a>
        <a href="sculpture.html">Sculpture</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>Photography</h1>
    <p class="intro">A curated selection of photographic work from recent shoots and visual studies.</p>
    <section class="gallery" aria-label="Photography gallery">
      <figure>
        <img src="photos/001.jpg" alt="Photography piece 1">
      </figure>
      <figure>
        <img src="photos/002.jpg" alt="Photography piece 2">
      </figure>
      <figure>
        <img src="photos/003.jpg" alt="Photography piece 3">
      </figure>
      <figure>
        <img src="photos/004.jpg" alt="Photography piece 4">
      </figure>
      <figure>
        <img src="photos/005.jpg" alt="Photography piece 5">
      </figure>
      <figure>
        <img src="photos/006.jpg" alt="Photography piece 6">
      </figure>
      <figure>
        <img src="photos/007.jpg" alt="Photography piece 7">
      </figure>
      <figure>
        <img src="photos/008.jpg" alt="Photography piece 8">
      </figure>
      <figure>
        <img src="photos/Arellano_A01.jpg" alt="Photography piece Arellano A01">
      </figure>
      <figure>
        <img src="photos/Arellano_A02.jpg" alt="Photography piece Arellano A02">
      </figure>
      <figure>
        <img src="photos/Arellano_A03.jpg" alt="Photography piece Arellano A03">
      </figure>
    </section>
  </main>

  <footer class="container">© 2026 unph0togenic</footer>
</body>
</html>
